<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord 机器人控制台</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --panel: #2b2b2b;
            --line: #333;
            --text: #ffffff;
            --text-muted: #888;
            --text-soft: #ccc;
            --primary: #2563eb;
            --discord: #5865f2;
            --discord-hover: #4752c4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            padding: 2rem;
        }

        .container {
            max-width: 1120px;
            margin: 0 auto;
        }

        .header {
            background: var(--panel);
            border-left: 4px solid var(--primary);
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
        }

        .header h1 {
            color: var(--text);
            font-size: 1.55rem;
            font-weight: 600;
            margin-bottom: 0.45rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .status-bar {
            background: var(--panel);
            border-bottom: 1px solid var(--line);
            padding: 1.15rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.65rem;
        }

        .status-text {
            color: var(--text-soft);
            font-size: 0.9rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
        }

        .main-content {
            background: var(--panel);
            border: 1px solid var(--line);
            padding: 3rem 2rem;
            text-align: center;
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            background: rgba(37, 99, 235, 0.08);
            border: 1px solid rgba(37, 99, 235, 0.35);
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            letter-spacing: 0.03em;
        }

        .main-content h2 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .description {
            color: var(--text-soft);
            font-size: 1rem;
            line-height: 1.75;
            max-width: 680px;
            margin: 0 auto 2rem;
        }

        .login-btn {       
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0.9rem 1.8rem;
            background: var(--discord);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid transparent;
            transition: background 0.2s;
            margin-bottom: 2rem;
        }

        .login-btn:hover {
            background: var(--discord-hover);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1px;
            background: var(--line);
            border: 1px solid var(--line);
            margin-top: 2rem;
            text-align: left;
        }

        .feature-item {
            background: var(--panel);
            padding: 1.25rem;
            color: var(--text-soft);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.9rem;
        }

        .feature-icon {
            width: 7px;
            height: 7px;
            background: var(--primary);
            flex-shrink: 0;
        }

        .footer {
            background: var(--panel);
            border-top: 1px solid var(--line);
            padding: 1.25rem 1.5rem;
            margin-top: 1.5rem;
            color: #666;
            font-size: 0.85rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .header,
            .status-bar,
            .main-content,
            .footer {
                flex-direction: column;
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .status-bar {
                align-items: flex-start;
            }

            .main-content {
                padding-top: 2.25rem;
                padding-bottom: 2.25rem;
            }

            .main-content h2 {
                font-size: 1.55rem;
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Discord 机器人控制台</h1>
            <div class="subtitle">Bot Management Dashboard</div>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <span class="status-dot"></span>
                <span class="status-text">系统运行中</span>
            </div>
            <div class="status-item">
                <span class="status-text">Discord OAuth 登录</span>
            </div>
        </div>

        <div class="main-content">
            <div class="status-badge">控制台入口</div>
            <h2>使用 Discord 账号登录</h2>
            <div class="description">
                登录后可选择你拥有管理权限的服务器，进入后台查看统计数据、管理模块设置与处理日常操作。
            </div>

            <a href="/login" class="login-btn">使用 Discord 登录</a>

            <div class="feature-grid">
                <div class="feature-item">
                    <div class="feature-icon"></div>
                    <span>服务器选择与权限验证</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"></div>
                    <span>控制台设置与数据查看</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"></div>
                    <span>欢迎、工单与安全模块管理</span>
                </div>
            </div>
        </div>

        <div class="footer">
            © 2026 Discord Bot Dashboard · All Rights Reserved
        </div>
    </div>
</body>
</html>
